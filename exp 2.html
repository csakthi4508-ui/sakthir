<!DOCTYPE html>
<html>
<head>
<title>Automobile Industry</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background-image: url(https://wallpapers.com/images/featured/hd-car-o3yvt8dloqz5cvm4.jpg);
    background-position: center;
}

/* Center container */
.container{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card style */
.card{
    width:350px;
    text-align:center;
    padding:20px;
    border-radius:25px;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    box-shadow:0 0 25px rgba(255, 0, 0, 0.6);
}

/* Heading */
h2{
    color:#00e5ff;
}

/* Image */
.card img{
    width:100%;
    border-radius:20px;
    margin:15px 0;
}

/* Paragraph */
p{
    font-size:14px;
    color:#002bff;
    text-align:justify;
}

/* Button */
button{
    margin-top:10px;
    padding:10px 20px;
    border:none;
    border-radius:20px;
    background:orange;
    color:red;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:rgb(255, 0, 8);
}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h2>Welcome to Automobile Industry</h2>

<img src="https://images.unsplash.com/photo-1503376780353-7e6692767b70">

<p>
    “A car is not just a machine, it is a reflection of freedom and passion.”

    
“Speed is not just about moving fast; it is about controlling power.”
